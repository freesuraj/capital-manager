# fly.toml app configuration file generated for capital-manager on 2026-04-17T18:03:52+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'capital-manager'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

[env]
  NEXT_TELEMETRY_DISABLED = '1'
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '5s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
