name: Deploy to Fly.io

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Stage all server-side runtime secrets into Fly without triggering a
      # restart yet — the deploy step below picks them up atomically.
      - name: Set Fly.io runtime secrets
        run: |
          flyctl secrets set \
            SUPABASE_SECRET_KEY="${{ secrets.SUPABASE_SECRET_KEY }}" \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            GOOGLE_AI_API_KEY="${{ secrets.GOOGLE_AI_API_KEY }}" \
            --stage
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # NEXT_PUBLIC_* vars must be passed as Docker build args — Next.js bakes
      # them into the JS bundle at build time so the browser can read them.
      # SUPABASE_SECRET_KEY is intentionally NOT here (server-only).
      - name: Deploy to Fly.io
        run: |
          flyctl deploy --remote-only \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            --build-arg NEXT_PUBLIC_APP_URL="${{ secrets.NEXT_PUBLIC_APP_URL }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
